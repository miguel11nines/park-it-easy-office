name: Release

# SLSA Build Level 3 — hardened pipeline
# - All actions pinned to SHA digests (tamper-resistant)
# - Provenance generated by isolated, trusted builder (slsa-github-generator)
# - Least-privilege permissions per job
# - Non-falsifiable provenance signed via Sigstore + logged to Rekor
# - Checkout with persist-credentials: false (no token leakage)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v2.0.0)'
        required: true
        type: string

# Top-level: restrictive. Each job declares only what it needs.
permissions: {}

jobs:
  build:
    name: Build & Artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74 # v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: pnpm run build

      - name: Create release archive
        run: |
          cd dist
          tar -czvf ../park-it-easy-office-${{ steps.version.outputs.version }}.tar.gz .

      - name: Generate SBOM
        run: npx --yes @cyclonedx/cdxgen -o sbom.json

      - name: Generate checksums
        id: hash
        run: |
          sha256sum park-it-easy-office-${{ steps.version.outputs.version }}.tar.gz > checksums.txt
          sha256sum sbom.json >> checksums.txt
          echo "hashes=$(cat checksums.txt | base64 -w0)" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: release-artifacts
          path: |
            park-it-easy-office-${{ steps.version.outputs.version }}.tar.gz
            sbom.json
            checksums.txt
          retention-days: 5

  provenance:
    name: SLSA Provenance (Build L3)
    needs: [build]
    # Runs in an isolated, trusted environment — cannot be influenced by the build job.
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: '${{ needs.build.outputs.hashes }}'
      upload-assets: true
      compile-generator: true

  release-deploy:
    name: Release & Deploy
    needs: [build, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: release-artifacts

      - name: Attest Build Provenance
        id: attest
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: 'park-it-easy-office-${{ needs.build.outputs.version }}.tar.gz'

      - name: Attest SBOM
        uses: actions/attest-sbom@51e74621a501c89df81fc1391c5a8f4cfc9fab2f # v3
        with:
          subject-path: 'park-it-easy-office-${{ needs.build.outputs.version }}.tar.gz'
          sbom-path: 'sbom.json'

      - name: Extract Rekor Log Index
        id: rekor
        run: |
          if [ -f "${{ steps.attest.outputs.bundle-path }}" ]; then
            LOG_INDEX=$(jq -r '.verificationMaterial.tlogEntries[0].logIndex // empty' "${{ steps.attest.outputs.bundle-path }}")
            echo "log-index=$LOG_INDEX" >> $GITHUB_OUTPUT
          fi

      - name: Generate Changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          VERSION="${{ needs.build.outputs.version }}"
          REPO="${{ github.repository }}"
          ATTESTATION="${{ steps.attest.outputs.attestation-url }}"
          REKOR_INDEX="${{ steps.rekor.outputs.log-index }}"

          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > CHANGELOG.md
            git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" >> CHANGELOG.md
          else
            echo "## Initial Release" > CHANGELOG.md
            git log --pretty=format:"- %s (%h)" >> CHANGELOG.md
          fi

          TAR_HASH=$(sha256sum park-it-easy-office-${VERSION}.tar.gz | cut -d' ' -f1)
          SBOM_HASH=$(sha256sum sbom.json | cut -d' ' -f1)

          {
            echo ""
            echo "---"
            echo ""
            echo "## Supply Chain Security"
            echo ""
            echo "This release meets [SLSA Build Level 3](https://slsa.dev/spec/v1.0/levels#build-l3):"
            echo "- Provenance generated by isolated, trusted builder (slsa-github-generator)"
            echo "- All actions pinned to SHA digests"
            echo "- Signed via Sigstore, logged to Rekor transparency log"
            echo ""
            if [ -n "$ATTESTATION" ]; then
              echo "**Build attestation:** [view](${ATTESTATION})"
              [ -n "$REKOR_INDEX" ] && echo " | [Rekor log](https://search.sigstore.dev?logIndex=${REKOR_INDEX})"
            fi
            echo ""
            echo "### Verify"
            echo ""
            echo '```bash'
            echo "# Verify build provenance"
            echo "gh attestation verify park-it-easy-office-${VERSION}.tar.gz -R ${REPO}"
            echo ""
            echo "# Verify with slsa-verifier (stricter)"
            echo "slsa-verifier verify-artifact park-it-easy-office-${VERSION}.tar.gz \\"
            echo "  --provenance-path multiple.intoto.jsonl \\"
            echo "  --source-uri github.com/${REPO}"
            echo '```'
            echo ""
            echo "<details>"
            echo "<summary>SHA256 Checksums</summary>"
            echo ""
            echo '```'
            echo "${TAR_HASH}  park-it-easy-office-${VERSION}.tar.gz"
            echo "${SBOM_HASH}  sbom.json"
            echo '```'
            echo ""
            echo "</details>"
          } >> CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: Release ${{ needs.build.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            park-it-easy-office-${{ needs.build.outputs.version }}.tar.gz
            sbom.json
            checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract build for Pages
        run: |
          mkdir -p dist
          tar -xzvf park-it-easy-office-${{ needs.build.outputs.version }}.tar.gz -C dist/

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
