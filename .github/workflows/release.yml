name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v2.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build & Artifacts
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: pnpm run build

      - name: Create release archive
        run: |
          cd dist
          tar -czvf ../park-it-easy-office-${{ steps.version.outputs.version }}.tar.gz .

      - name: Generate SBOM
        run: npx --yes @cyclonedx/cdxgen -o sbom.json

      - name: Generate checksums
        id: hash
        run: |
          sha256sum park-it-easy-office-${{ steps.version.outputs.version }}.tar.gz > checksums.txt
          sha256sum sbom.json >> checksums.txt
          echo "hashes=$(cat checksums.txt | base64 -w0)" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-artifacts
          path: |
            park-it-easy-office-${{ steps.version.outputs.version }}.tar.gz
            sbom.json
            checksums.txt
          retention-days: 5

  provenance:
    name: SLSA Provenance
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: '${{ needs.build.outputs.hashes }}'
      upload-assets: true
      compile-generator: true

  release-deploy:
    name: Release & Deploy
    needs: [build, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: release-artifacts

      - name: Attest Build Provenance
        id: attest
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'park-it-easy-office-${{ needs.build.outputs.version }}.tar.gz'

      - name: Attest SBOM
        uses: actions/attest-sbom@v3
        with:
          subject-path: 'park-it-easy-office-${{ needs.build.outputs.version }}.tar.gz'
          sbom-path: 'sbom.json'

      - name: Extract Rekor Log Index
        id: rekor
        run: |
          if [ -f "${{ steps.attest.outputs.bundle-path }}" ]; then
            LOG_INDEX=$(jq -r '.verificationMaterial.tlogEntries[0].logIndex // empty' "${{ steps.attest.outputs.bundle-path }}")
            echo "log-index=$LOG_INDEX" >> $GITHUB_OUTPUT
          fi

      - name: Generate Changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          VERSION="${{ needs.build.outputs.version }}"
          REPO="${{ github.repository }}"
          ATTESTATION="${{ steps.attest.outputs.attestation-url }}"
          REKOR_INDEX="${{ steps.rekor.outputs.log-index }}"

          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > CHANGELOG.md
            git log $PREV_TAG..HEAD --pretty=format:"- %s (%h)" >> CHANGELOG.md
          else
            echo "## Initial Release" > CHANGELOG.md
            git log --pretty=format:"- %s (%h)" >> CHANGELOG.md
          fi

          TAR_HASH=$(sha256sum park-it-easy-office-${VERSION}.tar.gz | cut -d' ' -f1)
          SBOM_HASH=$(sha256sum sbom.json | cut -d' ' -f1)

          {
            echo ""
            echo "---"
            echo ""
            echo "## Attestation & Transparency"
            echo ""
            if [ -n "$ATTESTATION" ]; then
              echo "**Build:** [attestation](${ATTESTATION})"
              [ -n "$REKOR_INDEX" ] && echo " | [Rekor log](https://search.sigstore.dev?logIndex=${REKOR_INDEX})"
            fi
            echo ""
            echo "### Verify"
            echo ""
            echo '```bash'
            echo "gh attestation verify park-it-easy-office-${VERSION}.tar.gz -R ${REPO}"
            echo '```'
            echo ""
            echo "<details>"
            echo "<summary>SHA256 Checksums</summary>"
            echo ""
            echo '```'
            echo "${TAR_HASH}  park-it-easy-office-${VERSION}.tar.gz"
            echo "${SBOM_HASH}  sbom.json"
            echo '```'
            echo ""
            echo "</details>"
          } >> CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: Release ${{ needs.build.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            park-it-easy-office-${{ needs.build.outputs.version }}.tar.gz
            sbom.json
            checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract build for Pages
        run: |
          mkdir -p dist
          tar -xzvf park-it-easy-office-${{ needs.build.outputs.version }}.tar.gz -C dist/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
